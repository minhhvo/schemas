name: Bundle JSON Schemas

on:
  push:
    branches: [ dev ]
    paths:
      - 'v*/**.schema.json'
      - '!**/bundle-*.schema.json' # Prevents infinite loops when bundles are pushed
  workflow_dispatch: # Adds a "Run workflow" button in the GitHub UI

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: (1) Checkout repository
        uses: actions/checkout@v6

      - name: (2) Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: (3) Install dependencies
        run: npm ci

      - name: (4) Clean existing bundles across all versions
        run: |
          shopt -s nullglob
          rm -f ./v*/bundle-*.schema.json

      - name: (5) Bundle schemas across all versions
        run: |
          shopt -s extglob nullglob globstar
          node schemaBundler.js ./v*/**/!(bundle-*).schema.json

      - name: (6) Commit and Push Bundled Schemas
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(build): auto-generate schema bundles [skip ci]"
          file_pattern: '**/bundle-*.schema.json'